services:
  status:
    image: ghcr.io/sentient-soup/perihelion-status:latest
    build: .
    container_name: perihelion-status
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - status-data:/data
      - ./services.json:/config/services.json:ro
    environment:
      - DENO_KV_PATH=/data/status.db
      - SERVICES_FILE=/config/services.json

volumes:
  status-data:
